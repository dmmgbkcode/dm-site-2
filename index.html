<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Namorada do Feijão</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      color: #333;
    }

    .container {
      padding: 20px;
    }

    h1 {
      font-size: 28px;
    }

    .hidden {
      display: none;
    }

    button {
      padding: 12px 20px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      margin: 10px;
      cursor: pointer;
    }

    .primary {
      background-color: #ff4d6d;
      color: white;
    }

    .gallery img {
      width: 100%;
      max-width: 300px;
      margin: 10px;
      border-radius: 10px;
    }

    #noBtn {
      position: absolute;
    }
  </style>
</head>
<body>

<div class="container" id="start">
  <h1>💖 Bem-vindo 💖</h1>
  <p>Uma Mensagem Para Kemilly...</p>
  <button class="primary" onclick="mostrarConteudo()">Clique para descobrir</button>
</div>

<div class="container hidden" id="conteudo">
  <h1>💘 Veridiana 💘</h1>
  <p><strong>Namorada do Feijão 🫘</strong></p>

  <h2>📸 Casal do Ano</h2>
  <div class="gallery">
    <!-- COLOQUE SUAS IMAGENS AQUI -->
    <img src="feijao.jpeg" alt="Foto 1">
    <img src="kemilly.jpeg" alt="Foto 2">
  </div>

  <h2>Ela aceita ser a Namorada do Feijão?</h2>
  <button class="primary" onclick="respostaSim()">SIM 💖</button>
  <button id="noBtn" onclick="fugir()">NÃO 😡</button>

  <p id="mensagem"></p>
</div>

<script>
  function mostrarConteudo() {
    document.getElementById('start').classList.add('hidden');
    document.getElementById('conteudo').classList.remove('hidden');
  }

  function respostaSim() {
    document.getElementById('mensagem').innerText = 'Resposta correta. Sistema validado com sucesso.';
  }

  function fugir() {
    const btn = document.getElementById('noBtn');
    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 50);
    btn.style.left = x + 'px';
    btn.style.top = y + 'px';
  }
</script>

</body>
</html>
